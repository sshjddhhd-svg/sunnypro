openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bot
    description: Bot control operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get bot status
      description: Returns current bot status and health info
      responses:
        "200":
          description: Bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/start:
    post:
      operationId: startBot
      tags: [bot]
      summary: Start the bot
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotActionResult"

  /bot/stop:
    post:
      operationId: stopBot
      tags: [bot]
      summary: Stop the bot
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotActionResult"

  /bot/appstate:
    post:
      operationId: uploadAppState
      tags: [bot]
      summary: Upload new AppState (cookies)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppStateUpload"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotActionResult"

  /bot/config:
    get:
      operationId: getBotConfig
      tags: [bot]
      summary: Get bot configuration
      responses:
        "200":
          description: Config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotConfigResponse"
    post:
      operationId: updateBotConfig
      tags: [bot]
      summary: Update bot configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotConfigUpdate"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotConfigResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    BotStatus:
      type: object
      properties:
        running:
          type: boolean
        connected:
          type: boolean
        userID:
          type: string
          nullable: true
        reconnectCount:
          type: number
        hasAppState:
          type: boolean
        message:
          type: string
          nullable: true
        health:
          type: object
          nullable: true
        config:
          $ref: "#/components/schemas/BotConfigSummary"
          nullable: true
      required:
        - running
        - connected
        - reconnectCount
        - hasAppState

    BotConfigSummary:
      type: object
      properties:
        prefix:
          type: string
        botName:
          type: string
        adminIDs:
          type: array
          items:
            type: string
        autoReconnect:
          type: boolean
        antiSpam:
          type: boolean
        welcomeMessage:
          type: boolean

    BotActionResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    AppStateUpload:
      type: object
      properties:
        appstate:
          description: AppState array or JSON string
      required:
        - appstate

    BotConfig:
      type: object
      properties:
        prefix:
          type: string
        adminIDs:
          type: array
          items:
            type: string
        botName:
          type: string
        autoReconnect:
          type: boolean
        reconnectDelay:
          type: number
        maxReconnectAttempts:
          type: number
        antiSpam:
          type: boolean
        antiSpamCooldown:
          type: number
        welcomeMessage:
          type: boolean
        enableGroupCommands:
          type: boolean
        enableAutoReply:
          type: boolean

    BotConfigResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
          nullable: true
        config:
          $ref: "#/components/schemas/BotConfig"
      required:
        - success

    BotConfigUpdate:
      type: object
      properties:
        prefix:
          type: string
        adminIDs:
          type: array
          items:
            type: string
        botName:
          type: string
        autoReconnect:
          type: boolean
        reconnectDelay:
          type: number
        maxReconnectAttempts:
          type: number
        antiSpam:
          type: boolean
        antiSpamCooldown:
          type: number
        welcomeMessage:
          type: boolean

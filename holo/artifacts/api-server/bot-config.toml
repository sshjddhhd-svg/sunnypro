# ╔══════════════════════════════════════════╗
# ║         إعدادات بوت Holo — Messenger     ║
# ╚══════════════════════════════════════════╝
# هذا الملف يوثّق جميع إعدادات البوت المتاحة.
# البوت يقرأ من bot-config.json — يمكن نقل القيم من هنا إليه.


# ──────────────────────────────────────────
# [core] — الإعدادات الأساسية
# ──────────────────────────────────────────
[core]

# اسم البوت (يظهر في رسائل الترحيب والمساعدة)
bot_name = "Holo"

# البادئة التي تسبق كل أمر  مثال: "." → .help
prefix = "."

# لغة البوت (ar = عربي)
language = "ar"


# ──────────────────────────────────────────
# [admins] — المشرفون
# ──────────────────────────────────────────
[admins]

# معرّفات فيسبوك للمشرفين (يمكن إضافة أكثر من معرّف)
ids = [
  "61588122232768",
]


# ──────────────────────────────────────────
# [connection] — إعدادات الاتصال
# ──────────────────────────────────────────
[connection]

# مسار ملف الـ appstate (كوكيز الجلسة)
appstate_path = "./appstate.json"

# إعادة الاتصال تلقائياً عند الانقطاع
auto_reconnect = true

# الانتظار بين كل محاولة إعادة اتصال (بالميلي ثانية)
# 5000 = 5 ثواني
reconnect_delay = 5000

# أقصى عدد محاولات إعادة الاتصال قبل التوقف
max_reconnect_attempts = 10


# ──────────────────────────────────────────
# [security] — الأمان
# ──────────────────────────────────────────
[security]

# قفل البوت: عند التفعيل لا يستجيب إلا للمشرفين
locked = false

# تفعيل الحماية من السبام
anti_spam = true

# المدة بين رسالتين للمستخدم نفسه (بالميلي ثانية)
# 3000 = 3 ثواني
anti_spam_cooldown = 3000


# ──────────────────────────────────────────
# [features] — الميزات
# ──────────────────────────────────────────
[features]

# تفعيل أوامر المجموعات (.الاسم، .محرك، .اعضاء ...)
enable_group_commands = true

# إرسال ردود تلقائية
enable_auto_reply = true

# رسالة ترحيب عند انضمام عضو جديد
welcome_message = true


# ──────────────────────────────────────────
# [logging] — السجلات
# ──────────────────────────────────────────
[logging]

# مستوى التفاصيل: trace | debug | info | warn | error
level = "info"


# ──────────────────────────────────────────
# [credentials] — بيانات الدخول (اختياري)
# ──────────────────────────────────────────
# إذا لم يتوفر appstate يمكن تسجيل الدخول بالبريد/الهاتف
[credentials]

# رقم الهاتف أو البريد الإلكتروني
identifier = ""

# كلمة المرور (احفظ هذا الملف بأمان)
password = ""


# ──────────────────────────────────────────
# [engine] — إعدادات المحرك (.محرك)
# ──────────────────────────────────────────
[engine]

# الحد الأدنى للتأخير بين كل رسالة (بالميلي ثانية)
min_interval = 3000

# الحد الأقصى للتأخير (بالميلي ثانية)
max_interval = 8000


# ──────────────────────────────────────────
# [group_name_changer] — تغيير اسم الغروب (.الاسم)
# ──────────────────────────────────────────
[group_name_changer]

# الحد الأدنى للتأخير بين كل تغيير اسم (بالميلي ثانية)
min_interval = 10000

# الحد الأقصى للتأخير (بالميلي ثانية)
max_interval = 20000

[build]
builder = "NIXPACKS"

[build.env]
NODE_VERSION = "20.x"

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[phases.install]
# استخدم npm ci بدل npm install للتثبيت النظيف
cmds = ["npm ci"]

[phases.build]
# لو مافيش build steps فعلية، مجرد رسالة
cmds = ["echo Build complete"]
